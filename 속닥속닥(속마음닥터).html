<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음 회복 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sage:#7FA98A;
    --sage-light:#E7F1E9;
    --sand:#FFF8ED;
    --coral:#F2967A;
    --coral-light:#FDE9E1;
    --sky:#7FB3D5;
    --sky-light:#E6F1F8;
    --ink:#3D3D3A;
    --ink-soft:#6B6B65;
    --white:#FFFFFF;
    --shadow: 0 4px 14px rgba(61,61,58,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Gowun Dodum', sans-serif;
    background:var(--sand);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }
  .app{
    width:100%;
    max-width:480px;
    background:var(--white);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:28px 24px 32px;
    position:relative;
    overflow:hidden;
  }
  .app::before{
    content:'';
    position:absolute;
    top:-40px; right:-40px;
    width:140px; height:140px;
    background:var(--sage-light);
    border-radius:50%;
    z-index:0;
  }
  .content{position:relative; z-index:1;}

  .progress{
    display:flex;
    gap:8px;
    margin-bottom:28px;
  }
  .progress-dot{
    flex:1;
    height:8px;
    border-radius:4px;
    background:#EDEBE3;
    transition:background 0.3s;
  }
  .progress-dot.done{background:var(--sage);}
  .progress-dot.current{background:var(--coral);}

  h1{
    font-family:'Gaegu', sans-serif;
    font-size:26px;
    font-weight:700;
    margin:0 0 6px;
    color:var(--ink);
  }
  .subtitle{
    font-size:15px;
    color:var(--ink-soft);
    margin:0 0 24px;
    line-height:1.6;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .option-btn{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    text-align:left;
    padding:16px 18px;
    border:2px solid #EDEBE3;
    border-radius:18px;
    background:var(--white);
    font-family:inherit;
    font-size:16px;
    color:var(--ink);
    cursor:pointer;
    transition:all 0.15s;
  }
  .option-btn:hover{
    border-color:var(--sage);
    background:var(--sage-light);
  }
  .option-btn .emoji{
    font-size:26px;
    flex-shrink:0;
  }
  .option-btn.selected{
    border-color:var(--coral);
    background:var(--coral-light);
  }

  .nav{
    display:flex;
    justify-content:space-between;
    margin-top:28px;
  }
  .nav-btn{
    padding:12px 22px;
    border-radius:14px;
    border:none;
    font-family:inherit;
    font-size:15px;
    cursor:pointer;
  }
  .btn-back{
    background:transparent;
    color:var(--ink-soft);
  }
  .btn-next{
    background:var(--sage);
    color:var(--white);
    font-weight:600;
  }
  .btn-next:disabled{
    background:#DCDAD2;
    cursor:not-allowed;
  }

  /* 결과 화면 */
  .result-card{
    border-radius:20px;
    padding:22px 20px;
    margin-bottom:14px;
  }
  .result-card.primary{
    background:var(--sage-light);
    border:2px solid var(--sage);
  }
  .result-label{
    font-size:13px;
    font-weight:700;
    letter-spacing:0.5px;
    margin-bottom:6px;
  }
  .result-card.primary .result-label{color:#3E6B4B;}

  .tip-box{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:var(--sky-light);
    border-radius:16px;
    padding:14px 16px;
    font-size:14px;
    line-height:1.6;
    color:var(--ink);
    margin-bottom:16px;
  }
  .empathy-box{
    background:var(--coral-light);
    border-radius:16px;
    padding:14px 16px;
    font-size:14px;
    line-height:1.6;
    color:var(--ink);
    margin-bottom:16px;
  }
  .unsure-note{
    background:var(--coral-light);
    border-radius:16px;
    padding:12px 16px;
    font-size:13.5px;
    line-height:1.6;
    color:var(--ink-soft);
    margin-bottom:16px;
  }
  .result-title{
    font-family:'Gaegu', sans-serif;
    font-size:22px;
    font-weight:700;
    margin:0 0 8px;
  }
  .result-desc{
    font-size:15px;
    line-height:1.7;
    color:var(--ink);
    margin:0;
  }

  .script-toggle{
    width:100%;
    margin-top:8px;
    padding:14px 16px;
    border-radius:16px;
    border:2px dashed #D8D5C9;
    background:transparent;
    font-family:inherit;
    font-size:14px;
    color:var(--ink-soft);
    cursor:pointer;
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .script-box{
    display:none;
    background:var(--coral-light);
    border-radius:16px;
    padding:18px;
    margin-top:10px;
    font-size:14.5px;
    line-height:1.8;
    color:var(--ink);
  }
  .script-box.open{display:block;}
  .script-box .line{
    margin:0 0 8px;
    padding-left:14px;
    border-left:3px solid var(--coral);
  }

  .restart-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border-radius:16px;
    border:none;
    background:var(--ink);
    color:var(--white);
    font-family:inherit;
    font-size:15px;
    cursor:pointer;
  }

  .step-emoji-banner{
    text-align:center;
    font-size:40px;
    margin-bottom:6px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="content" id="content"></div>
</div>

<script>
// ---------- 데이터 정의 ----------
const steps = [
  {
    key: 'situation',
    title: '무슨 일이 있었나요?',
    subtitle: '가장 가까운 상황을 골라주세요',
    options: [
      { id:'mutual', emoji:'💥', label:'친구와 서로 갈등이 있는 상황' },
      { id:'theirs', emoji:'😢', label:'친구가 나한테 잘못한 상황' },
      { id:'mine', emoji:'😣', label:'내가 친구에게 잘못한 상황' },
      { id:'estranged', emoji:'🌫️', label:'싸우진 않았지만 관계가 소원해진 상황' },
    ]
  },
  {
    key: 'emotion',
    title: '지금 제일 많이 느껴지는 감정은 무엇인가요?',
    subtitle: '지금 마음과 가장 비슷한 것을 골라주세요',
    options: [
      { id:'angry', emoji:'😠', label:'화가 나요' },
      { id:'sad', emoji:'😔', label:'속상하고 슬퍼요' },
      { id:'frustrated', emoji:'😖', label:'답답하고 억울해요' },
      { id:'scared', emoji:'😰', label:'무섭고 불안해요' },
    ]
  },
  {
    key: 'want',
    title: '지금 제일 하고 싶은 건 뭔가요?',
    subtitle: '가장 바라는 것을 골라주세요',
    options: [
      { id:'apology', emoji:'🙏', label:'사과받기' },
      { id:'advice', emoji:'🗨️', label:'누군가에게 털어놓고 조언받기' },
      { id:'talk', emoji:'🤝', label:'서로 대화하며 화해하기' },
      { id:'unsure', emoji:'🤔', label:'잘 모르겠어요' },
    ]
  }
];

// 1단계에서 고른 상황에 따라 달라지는 세부 선택지 (자기 성찰용, 따돌림만 예외적으로 결과에 반영됨)
const situationDetails = {
  mutual: [
    { id:'argument', emoji:'😤', label:'말다툼을 했어요' },
    { id:'mutual_anger', emoji:'😡', label:'서로 화를 냈어요' },
    { id:'misunderstanding', emoji:'❓', label:'오해가 생겼어요' },
  ],
  theirs: [
    { id:'teased', emoji:'😝', label:'놀림을 당했어요' },
    { id:'cursed', emoji:'🤬', label:'욕을 들었어요' },
    { id:'excluded', emoji:'🚫', label:'따돌림을 당했어요' },
  ],
  mine: [
    { id:'broke_promise', emoji:'🤞', label:'약속을 어겼어요' },
    { id:'hurt_friend', emoji:'💔', label:'친구를 속상하게 했어요' },
    { id:'got_angry_first', emoji:'😠', label:'먼저 화를 냈어요' },
    { id:'lied', emoji:'🤥', label:'거짓말을 했어요' },
  ],
  estranged: [
    { id:'avoided', emoji:'🙈', label:'친구가 나를 피해요' },
    { id:'not_playing', emoji:'🚶', label:'같이 놀지 않아요' },
    { id:'awkward', emoji:'😶', label:'어색해졌어요' },
  ]
};

// 실제 화면에 쓰일 단계 목록. 세부 선택 단계는 1단계 답변에 따라 옵션이 달라지므로 매번 새로 계산한다.
function getSteps(){
  const detailStep = {
    key: 'detail',
    title: '조금 더 자세히 떠올려보면요?',
    subtitle: '가장 비슷한 걸 골라주세요',
    options: situationDetails[answers.situation] || []
  };
  return [ steps[0], detailStep, steps[1], steps[2] ];
}

// 결과 데이터 (variants: 같은 결과라도 트리거 이유/원하는 것에 따라 대본이 달라짐)
const RESULTS = {
  teacher: {
    title:'선생님께 이야기하기',
    desc:'지금 상황은 혼자 해결하기 어려울 수 있어요. 선생님이나 부모님처럼 믿을 수 있는 어른에게 있었던 일을 이야기하고 도움을 받아보세요.',
    script:['선생님, 드릴 말씀이 있어요.', '(있었던 일)이 있었는데, 저 혼자 해결하기 어려운 것 같아요.', '어떻게 하면 좋을지 도와주시겠어요?'],
    variants:{
      scared:['선생님, 저 지금 많이 무섭고 불안해요.', '(있었던 일)이 있었어요.', '도와주시면 좋겠어요.'],
      bullying:['선생님, 드릴 말씀이 있어요.', '얼마 동안 따돌림을 당하고 있어요.', '도와주세요.']
    }
  },
  apologize: {
    title:'먼저 사과하기',
    desc:'내가 실수했거나 잘못한 부분이 있다면, 먼저 용기 내어 사과하는 게 가장 빠르게 마음을 풀 수 있는 방법이에요. 상대방도 그때 어떤 마음이었을지 한번 생각해보면 사과가 더 진심으로 전해질 거예요.',
    script:['아까는 미안했어.', '내가 (한 행동) 때문에 네가 속상했을 것 같아.', '다음엔 이렇게 하지 않을게.']
  },
  reconnect: {
    title:'먼저 다가가기',
    desc:'크게 싸운 건 아니지만 사이가 어색해졌다면, 작은 용기를 내어 먼저 말을 걸어보는 게 관계를 되돌리는 가장 쉬운 방법이에요.',
    script:['안녕, 요즘 잘 지내?', '우리 같이 놀자!']
  },
  resolve_together: {
    title:'대화로 화해하기',
    desc:'서로 마음이 상했거나 오해가 있었을 수 있어요. 화내지 않고 차분하게 내 마음을 말하고, 상대방 이야기도 들어보세요. 내 마음을 말하기 전에, 상대방은 그때 어떤 기분이었을지도 한번 생각해보세요.',
    script:['나는 아까 (있었던 일) 때문에 마음이 속상했어.', '네 생각도 듣고 싶어.'],
    variants:{
      apology:['나는 아까 (있었던 일) 때문에 마음이 속상했어.', '나한테 사과해줄 수 있어?']
    }
  },
  reflect: {
    title:'생각 정리하기',
    desc:'지금은 무엇을 원하는지 확신이 없어도 괜찮아요. 조용히 오늘 있었던 일과 내 마음을 다시 떠올리며 정리하는 시간을 가져보세요.',
    script:['오늘 있었던 일을 한 문장으로 적어보면?', '그때 내 마음은 어땠을까?', '지금 나는 무엇을 하고 싶을까?'],
    toggleLabel:'🌱 이렇게 정리해볼까요?'
  }
};

// 감정별 공감 문구 (결과 화면에 항상 노출)
const EMPATHY = {
  angry: '많이 화가 났었군요. 그 마음, 당연히 그럴 수 있어요.',
  sad: '많이 속상하고 슬펐겠어요. 그 마음 충분히 이해돼요.',
  frustrated: '답답하고 억울한 마음이었군요. 그런 감정을 느끼는 건 자연스러운 일이에요.',
  scared: '많이 무섭고 불안했겠어요. 지금은 혼자가 아니에요.'
};

// ---------- 상태 ----------
let phase = 'intro'; // 'intro' -> 'steps' -> 'result'
let current = 0;
let answers = {};

// ---------- 로직: 우선순위 규칙 ----------
// 안전 게이트가 없으므로, '무섭고불안' 감정이 유일한 안전 신호 역할을 겸함
function decide(a){
  if(a.emotion==='scared'){
    return { key:'teacher', reason:'scared' };
  }
  if(a.situation==='theirs' && a.detail==='excluded'){
    return { key:'teacher', reason:'bullying' };
  }
  if(a.want==='advice'){
    return { key:'teacher' };
  }
  if(a.situation==='mine'){
    return { key:'apologize' };
  }
  if(a.situation==='estranged'){
    return { key:'reconnect' };
  }
  if(a.want==='unsure'){
    return { key:'reflect' };
  }
  return { key:'resolve_together' };
}

// ---------- 렌더링 ----------
function render(){
  const content = document.getElementById('content');

  if(phase === 'intro'){
    content.innerHTML = `
      <div style="text-align:center; padding: 20px 0;">
        <div class="step-emoji-banner">🤫</div>
        <h1 style="font-size:30px;">속닥속닥: 속마음 닥터</h1>
        <p class="subtitle">친구와 있었던 일, 지금 마음이 어떤지<br>같이 살펴볼까요?</p>
        <button class="nav-btn btn-next" style="width:100%; padding:16px;" onclick="startApp()">시작하기 →</button>
      </div>
    `;
    return;
  }

  if(phase === 'steps'){
    const activeSteps = getSteps();
    const step = activeSteps[current];
    const selected = answers[step.key];

    let dots = '';
    for(let i=0;i<activeSteps.length;i++){
      let cls = 'progress-dot';
      if(i < current) cls += ' done';
      else if(i === current) cls += ' current';
      dots += `<div class="${cls}"></div>`;
    }

    let optionsHtml = step.options.map(opt => `
      <button class="option-btn ${selected===opt.id?'selected':''}" onclick="selectOption('${step.key}','${opt.id}')">
        <span class="emoji">${opt.emoji}</span>
        <span>${opt.label}</span>
      </button>
    `).join('');

    content.innerHTML = `
      <div class="progress">${dots}</div>
      <h1>${step.title}</h1>
      <p class="subtitle">${step.subtitle}</p>
      <div class="options">${optionsHtml}</div>
      <div class="nav">
        <button class="nav-btn btn-back" onclick="goBack()">← 이전</button>
        <button class="nav-btn btn-next" ${selected?'':'disabled'} onclick="goNext()">
          ${current===activeSteps.length-1 ? '결과 보기' : '다음'} →
        </button>
      </div>
    `;
    return;
  }

  // 결과 화면
  const decision = decide(answers);
  const main = RESULTS[decision.key];

  let scriptLines = main.script;
  if(main.variants){
    if(decision.reason && main.variants[decision.reason]){
      scriptLines = main.variants[decision.reason];
    } else if(main.variants[answers.want]){
      scriptLines = main.variants[answers.want];
    }
  }

  content.innerHTML = `
    <div class="step-emoji-banner">🌤️</div>
    <h1 style="text-align:center;">마음을 살펴봤어요</h1>
    <p class="subtitle" style="text-align:center;">지금 상황엔 이런 방법이 도움이 될 수 있어요</p>

    ${EMPATHY[answers.emotion] ? `<div class="empathy-box">💛 ${EMPATHY[answers.emotion]}</div>` : ''}

    <div class="tip-box">
      <span>🌬️</span>
      <span>먼저 이렇게 해볼까요? 크게 숨을 3번 쉬고, 물 한 잔 마셔보세요.</span>
    </div>

    ${answers.want==='unsure' ? `<div class="unsure-note">아직 무엇을 해야 할지 몰라도 괜찮아요. 아래 방법부터 천천히 해보세요.</div>` : ''}

    <div class="result-card primary">
      <div class="result-label">추천</div>
      <div class="result-title">${main.title}</div>
      <p class="result-desc">${main.desc}</p>
    </div>

    <button class="script-toggle" onclick="toggleScript()">
      <span>${main.toggleLabel || '💬 이렇게 말해볼까요? 대본 보기'}</span>
      <span id="script-arrow">▾</span>
    </button>
    <div class="script-box" id="script-box">
      ${scriptLines.map(line=>`<p class="line">${line}</p>`).join('')}
    </div>

    <button class="restart-btn" onclick="restart()">처음부터 다시 하기</button>
  `;
}

function startApp(){
  phase = 'steps';
  current = 0;
  render();
}

function selectOption(key, id){
  answers[key] = id;
  // 1단계(상황)를 다시 고르면 이전에 골랐던 세부 선택은 더 이상 유효하지 않으므로 초기화
  if(key === 'situation'){
    delete answers.detail;
  }
  render();
}

function goNext(){
  const activeSteps = getSteps();
  if(current < activeSteps.length - 1){
    current++;
  } else {
    phase = 'result';
  }
  render();
}

function goBack(){
  if(current > 0){
    current--;
  } else {
    phase = 'intro';
  }
  render();
}

function toggleScript(){
  const box = document.getElementById('script-box');
  const arrow = document.getElementById('script-arrow');
  box.classList.toggle('open');
  arrow.textContent = box.classList.contains('open') ? '▴' : '▾';
}

function restart(){
  phase = 'intro';
  current = 0;
  answers = {};
  render();
}

render();
</script>

</body>
</html>
